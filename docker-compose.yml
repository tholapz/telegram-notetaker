services:
  telegram-notetaker:
    image: ghcr.io/tholapz/telegram-notetaker:latest
    restart: always
    env_file: .env
    volumes:
      - notes_data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  notes_data:
    driver: local
